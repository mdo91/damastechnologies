<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Software and AI transformation startup landing page."
    />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <script>
      // Decode GitHub Pages SPA fallback redirects.
      (function () {
        const { location } = window;
        if (location.search.length > 1 && location.search[1] === "/") {
          const decoded = location.search
            .slice(1)
            .split("&")
            .map((part) => part.replace(/~and~/g, "&"))
            .join("?");
          const basePath = location.pathname.endsWith("/")
            ? location.pathname.slice(0, -1)
            : location.pathname;
          window.history.replaceState(null, "", `${basePath}${decoded}${location.hash}`);
        }
      })();
    </script>
    <title>Agentic Intelligence Transformation</title>
  </head>
  <body class="bg-white">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
